<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Theme color for supported browsers. Provide light/dark variants and a Microsoft tile color as fallbacks. -->
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#4f46e5" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#8b5cf6" />
    <!-- Windows tile color fallback -->
    <meta name="msapplication-TileColor" content="#8b5cf6" />
    <meta name="description" content="Stock Simulator BD - Practice trading Dhaka Stock Exchange stocks risk-free." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="application-name" content="Stock Simulator BD" />
    <meta name="apple-mobile-web-app-title" content="Stock Simulator BD" />
    <title>Stock Simulator BD</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #ffffff;
            position: fixed;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        #__next {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* Updated to match new Violet/Indigo branding */
            background: linear-gradient(135deg, #8b5cf6 0%, #4f46e5 100%);
            color: white;
            flex-direction: column;
            gap: 20px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="__next">
        <div class="loading">
            <div class="spinner"></div>
            <p>Stock Simulator BD is loading...</p>
        </div>
    </div>
    
    <script>
        // Capacitor and web app setup
        window.addEventListener('load', () => {
            // Load the main app
            const script = document.createElement('script');
            script.src = '/_next/static/chunks/main.js';
            script.async = true;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
